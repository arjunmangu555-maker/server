const firebaseConfig = {
apiKey: "AIzaSyAwykQh11OnQrfLupJ6upB3DwcERVal044",

const db = firebase.database();

/* ORIGINAL CODE */

let symbols=[];

async function enableWakeLock(){

try{

wakeLock = await navigator.wakeLock.request('screen');

console.log("Wake Lock Active");

wakeLock.addEventListener("release", () => {

console.log("Wake Lock released");

if(isMasterScanner){
enableWakeLock();
}

});

}catch(err){

console.log("Wake Lock Failed", err);

}

}
function saveList(){
db.ref("scanner").set(highRvolSymbols);
}

async function loadList(){

// ⭐ LOAD FAVORITES FROM FIREBASE
db.ref("favorites").on("value",(snap)=>{
favorites = snap.val() || [];
if(Object.keys(highRvolSymbols).length)
render();
});

let firstLoad = true;

db.ref("scanner").on("value",(snapshot)=>{

let newData = snapshot.val() || {};

if(!firstLoad){

for(let s in newData){

if(!highRvolSymbols[s]){

// 🔔 SOUND FOR VIEWER + MASTER BOTH
if(settings.sound){
let now = Date.now();

if(now - lastSoundTime > 2000){ // 2 sec gap
const sound=document.getElementById("alertSound");
sound.currentTime=0;
sound.play();

lastSoundTime = now;
}
}

}

}

}

for(let k in newData){
if(typeof newData[k] === "number"){
newData[k] = { time: newData[k], rvol: 0 };
}
}
highRvolSymbols = newData;

render();

firstLoad = false;

});

const s = localStorage.getItem("rvolSettings");
if(s) settings = JSON.parse(s);

}

function saveSettings(){
localStorage.setItem("rvolSettings", JSON.stringify(settings));
}

function formatTime(ts){
const d = new Date(ts);

const day = String(d.getDate()).padStart(2,'0');
const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const month = months[d.getMonth()];

const hours = String(d.getHours()).padStart(2,'0');
const mins = String(d.getMinutes()).padStart(2,'0');

return `${day}-${month}, ${hours}:${mins}`;
}

async function checkScannerLock(){

const lockRef = db.ref("scannerLock");

const result = await lockRef.transaction(current => {

if(current === null){
return true;   
}

return;

});

if(result.committed){

if(!isMasterScanner){
console.log("Became MASTER → starting scanner");

enableWakeLock();
scannerRunning = false;
await scan();
scannerLoop();
}

isMasterScanner = true;
document.getElementById("updateText").innerText = "Master Scanner";

}else{

if(isMasterScanner){
console.log("Lost MASTER → stopping scanner");

scannerRunning = false;

if(wakeLock){
wakeLock.release().catch(()=>{});
wakeLock = null;
}
}

isMasterScanner = false;
document.getElementById("updateText").innerText = "Viewer Mode";

}
}
	
document.getElementById("resetBtn").onclick=()=>{

if(confirm("Reset Scanner ? All saved data will be cleared.")){

db.ref("scanner").remove();
db.ref("scannerLock").remove();
db.ref("favorites").remove();
localStorage.removeItem("rvolSettings");
location.reload();

}

};

document.getElementById("resetMasterBtn").onclick = function(){

if(!confirm("Force remove master scanner lock?")){
return;
}

db.ref("scannerLock").remove()
.catch(err=>{
console.error("Error clearing master lock:",err);
});

};

async function fetchSymbols(){

const res=await fetch("https://fapi.binance.com/fapi/v1/exchangeInfo");
const data=await res.json();

symbols=data.symbols
.filter(s=>
s.contractType==="PERPETUAL" &&
s.quoteAsset==="USDT" &&
s.status==="TRADING"
)
.map(s=>s.symbol)

}

async function fetchLivePrice(symbol){
try{
const res = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${symbol}`);
const data = await res.json();
return parseFloat(data.price);
}catch{
return null;
}
}

async function fetchWithTimeout(url, timeout=10000){

return Promise.race([

fetch(url),

new Promise((_,reject)=>
setTimeout(()=>reject(new Error("timeout")),timeout)
)

]);

}

async function getRVOLData(symbol){
try{

const res=await fetchWithTimeout(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=15m&limit=202`,10000);

const data=await res.json();
if(!Array.isArray(data)) return null;

// 200 candles avg
let vols=data.slice(0,200).map(x=>parseFloat(x[5]));
let avg=vols.reduce((a,b)=>a+b,0)/200;

// last 2 candles
let closedVol=parseFloat(data[200][5]);
let liveVol=parseFloat(data[201][5]);

let rvol_closed=closedVol/avg;
let rvol_live=liveVol/avg;

let minR = settings.minRvol || 15;

// OR condition
if(rvol_closed >= minR || rvol_live >= minR){

// return jo pass kare
if(rvol_live >= minR){
return Math.floor(rvol_live);
}else{
return Math.floor(rvol_closed);
}

}

return null;

}catch{
return null;
}
}

async function scan(){

if(!symbols.length){
document.getElementById("updateText").innerText="Waiting symbols...";
return;
}

document.getElementById("updateText").innerText="Scanning...";

const batchSize=50;
const delay=10000;

for(let i=0;i<symbols.length;i+=batchSize){

document.getElementById("updateText").innerText =
"Scanning: " + i + " / " + symbols.length;

let batch=symbols.slice(i,i+batchSize);

let promises=batch.map(s=>getRVOLData(s).then(r=>({s,r})));

let results=await Promise.all(promises);

for(let item of results){

if(item.r){

let isNew = !highRvolSymbols[item.s];

// 🔔 sound only if new symbol
if(isNew && settings.sound && isMasterScanner){

let now = Date.now();
if(now - lastSoundTime > 2000){
const sound=document.getElementById("alertSound");
sound.currentTime=0;
sound.play();
lastSoundTime = now;
}

}

// 📊 update or add symbol
highRvolSymbols = {
[item.s]:{
time:Date.now(),
rvol: item.r
},
...Object.fromEntries(
Object.entries(highRvolSymbols)
.filter(([k]) => k !== item.s)
)
};

// ⚡ save + render only if new OR updated
saveList();
render();

}
}

if(i+batchSize<symbols.length){
await new Promise(r=>setTimeout(r,delay));
}

}

document.getElementById("updateText").innerText=
"Done: "+new Date().toLocaleTimeString();

}

let sortDirection = -1; // newest first default
let currentSort = "time";


function sortList(type){

currentSort = type;

let entries = Object.entries(highRvolSymbols);

if(type==="symbol"){
entries.sort((a,b)=>a[0].localeCompare(b[0]) * sortDirection);
}

if(type==="time"){
entries.sort((a,b)=>(a[1].time - b[1].time) * sortDirection);
}

if(type==="rvol"){
entries.sort((a,b)=>(a[1].rvol - b[1].rvol) * sortDirection);
}

sortDirection *= -1;

highRvolSymbols = Object.fromEntries(entries);

render();

}
function render(){

const tbody=document.getElementById("body");
tbody.innerHTML="";

let entries = Object.entries(highRvolSymbols);

// newest first (latest date top)
if(currentSort==="symbol"){
entries.sort((a,b)=>a[0].localeCompare(b[0]) * sortDirection);
}

if(currentSort==="time"){
entries.sort((a,b)=>(a[1].time - b[1].time) * sortDirection);
}

if(currentSort==="rvol"){
entries.sort((a,b)=>(a[1].rvol - b[1].rvol) * sortDirection);
}

sortedKeys = entries.map(e => e[0]);
selectedIndex = sortedKeys.indexOf(selectedSymbol);

// ===== FAVORITES SECTION =====
if(favorites.length){

createSection("⭐ Favorites");

entries
.filter(([s]) => favorites.includes(s))
.forEach(([s]) => createRow(s));

createDivider();
}

// ===== NORMAL LIST =====
createSection("All Signals");

entries
.filter(([s]) => !favorites.includes(s))
.forEach(([s]) => createRow(s));
}

function createRow(s){

let row=document.createElement("tr");
row.style.height = settings.rowHeight + "px";

// ⭐ Favorite row highlight
if(favorites.includes(s)){
row.classList.add("favoriteRow");
}

if(selectedSymbol===s)
row.classList.add("selected");

row.innerHTML=`
<td>${s}</td>

<td>${formatTime(highRvolSymbols[s].time)}</td>
<td>${highRvolSymbols[s].rvol}</td>
`;

row.onclick=()=>{
hideMenu();  

selectedSymbol=s;
lastClickedSymbol=s;

changeChartSymbol(s);
render();

document.getElementById("tradeInfo").innerHTML =
'<button id="calcQtyBtn">Calculate Qty</button>';

bindQtyButton();
};

row.oncontextmenu=(e)=>{
e.preventDefault();

hideMenu();

contextSymbol = s;

const menu = document.getElementById("contextMenu");

// पहले visible करो ताकि size मिल सके
menu.style.display = "block";
menu.style.visibility = "hidden";

// menu size लो
const menuWidth = menu.offsetWidth;
const menuHeight = menu.offsetHeight;

// screen size
const screenWidth = window.innerWidth;
const screenHeight = window.innerHeight;

// default position
let left = e.clientX;
let top = e.clientY;

// 👉 RIGHT overflow check
if(left + menuWidth > screenWidth){
left = screenWidth - menuWidth - 5;
}

// 👉 BOTTOM overflow check
if(top + menuHeight > screenHeight){
top = screenHeight - menuHeight - 5;
}

// 👉 LEFT overflow safety
if(left < 5){
left = 5;
}

// 👉 TOP overflow safety
if(top < 5){
top = 5;
}

// apply final position
menu.style.left = left + "px";
menu.style.top = top + "px";

// अब show करो
menu.style.visibility = "visible";
};	
document.getElementById("body").appendChild(row);

}

function createSection(title){

let tr = document.createElement("tr");
tr.className = "sectionHeader";
tr.innerHTML = `<td colspan="3">${title}</td>`;
document.getElementById("body").appendChild(tr);

}

function createDivider(){

let tr = document.createElement("tr");
tr.className = "dividerRow";
tr.innerHTML = `<td colspan="3"></td>`;
document.getElementById("body").appendChild(tr);

}

document.addEventListener("keydown",(e)=>{

let keys = sortedKeys;

if(e.key==="ArrowDown"){

selectedIndex++;

if(selectedIndex >= keys.length)
selectedIndex = keys.length-1;

selectedSymbol = keys[selectedIndex];
changeChartSymbol(selectedSymbol);
render();

}

if(e.key==="ArrowUp"){

selectedIndex--;

if(selectedIndex < 0)
selectedIndex = 0;

selectedSymbol = keys[selectedIndex];
changeChartSymbol(selectedSymbol);
render();

}

});

const url="https://in.tradingview.com/chart/?symbol=BINANCE:"+contextSymbol+".P";

async function updateTradeInfo(symbol){

const info = document.getElementById("tradeInfo");

info.innerHTML =
"Symbol = " + symbol + "<br>" +
"Price  = loading...<br>" +
"Size   = " + settings.positionUSD + " USD<br>" +
"Qty    = --";

let price = await fetchLivePrice(symbol);

if(!price){
info.innerHTML =
"Symbol: " + symbol +
" &nbsp;&nbsp; Price: -- &nbsp;&nbsp; Qty: --";
return;
}

let usd = settings.positionUSD || 5.5;
let qty = usd / price;

info.innerHTML =
"Symbol = " + symbol + "<br>" +
"Price  = " + price.toFixed(6) + "<br>" +
"Size   = " + usd + " USD<br>" +
"Qty    = " + qty.toFixed(2) +
" <button id='copyQtyBtn' style='margin-left:6px;font-size:11px;'>📋</button>";

const copyBtn = document.getElementById("copyQtyBtn");
if(copyBtn){
copyBtn.onclick = ()=>{
navigator.clipboard.writeText(qty.toFixed(2));
copyBtn.innerText = "✓";
setTimeout(()=> copyBtn.innerText = "📋",1000);
};
}
}

function bindQtyButton(){

const btn = document.getElementById("calcQtyBtn");

if(!btn) return;

btn.onclick = ()=>{
if(lastClickedSymbol){
updateTradeInfo(lastClickedSymbol);
}
};

}


function initResize(){

const divider = document.getElementById("divider");
const left = document.querySelector(".left");

// load saved width
const savedWidth = localStorage.getItem("leftWidthPercent");

left.style.width = savedWidth + "%";
}


divider.addEventListener("touchstart", ()=>{
isDragging = true;
divider.classList.add("active");
});

document.addEventListener("touchmove",(e)=>{
if(!isDragging) return;

e.preventDefault();

let touch = e.touches[0];

if(settings.swapLayout){
lastPercent = ((window.innerWidth - touch.clientX) / window.innerWidth) * 100;
}else{
lastPercent = (touch.clientX / window.innerWidth) * 100;
}


if(lastPercent < 8) lastPercent = 8;
if(lastPercent > 50) lastPercent = 50;

if(!animationFrameId){
animationFrameId = requestAnimationFrame(()=>{
left.style.width = lastPercent + "%";
animationFrameId = null;
});
}
});

// 📱 TOUCH END
document.addEventListener("touchend", ()=>{
if(isDragging){
localStorage.setItem("leftWidthPercent", lastPercent);
}

isDragging = false;
divider.classList.remove("active");
});

divider.addEventListener("mousedown", ()=>{
isDragging = true;
divider.classList.add("active");
});

// mouse move
document.addEventListener("mousemove",(e)=>{
if(!isDragging) return;

if(settings.swapLayout){
lastPercent = ((window.innerWidth - e.clientX) / window.innerWidth) * 100;
}else{
lastPercent = (e.clientX / window.innerWidth) * 100;
}

// limit
if(lastPercent < 8) lastPercent = 8;
if(lastPercent > 50) lastPercent = 50;

// animation frame for smooth update
if(!animationFrameId){
animationFrameId = requestAnimationFrame(()=>{

left.style.width = lastPercent + "%";

animationFrameId = null;

});
}
});

document.addEventListener("mouseup", ()=>{
if(isDragging){

localStorage.setItem("leftWidthPercent", lastPercent);

}

isDragging = false;
divider.classList.remove("active");
});

}

function toggleTheme(){

currentTheme=currentTheme==="light"?"dark":"light";

if(selectedSymbol)
changeChartSymbol(selectedSymbol);
else

}

function applyLayout(){

const container = document.querySelector(".container");
const left = document.querySelector(".left");
const right = document.querySelector(".right");
const divider = document.getElementById("divider");

if(settings.swapLayout){

container.insertBefore(right, left);
container.insertBefore(divider, left);

}else{

container.insertBefore(left, right);
container.insertBefore(divider, right);

}

}

async function scannerLoop(){

while(scannerRunning){

await new Promise(r=>setTimeout(r,300000));

}
